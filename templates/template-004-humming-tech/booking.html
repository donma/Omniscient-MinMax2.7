          <h3>免費試用申請</h3>
          <p style="font-size:0.9rem;color:var(--text-dim);margin-bottom:16px">填寫以下表單，我們的顧問會親自聯繫你，確認需求與串接範圍後，開通你的試用帳戶。</p>
          <form style="display:flex;flex-direction:column;gap:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div class="form-group" style="margin-bottom:0"><label style="font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:6px;font-weight:500">姓名 *</label><input type="text" placeholder="姓名" style="width:100%;padding:12px 16px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.9rem;color:var(--text);border-radius:6px" required></div>
              <div class="form-group" style="margin-bottom:0"><label style="font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:6px;font-weight:500">公司 *</label><input type="text" placeholder="公司名稱" style="width:100%;padding:12px 16px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.9rem;color:var(--text);border-radius:6px" required></div>
            </div>
            <div class="form-group" style="margin-bottom:0"><label style="font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:6px;font-weight:500">Email *</label><input type="email" placeholder="工作 Email" style="width:100%;padding:12px 16px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.9rem;color:var(--text);border-radius:6px" required></div>
            <div class="form-group" style="margin-bottom:0"><label style="font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:6px;font-weight:500">電話</label><input type="tel" placeholder="聯絡電話" style="width:100%;padding:12px 16px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.9rem;color:var(--text);border-radius:6px"></div>
            <div class="form-group" style="margin-bottom:0"><label style="font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:6px;font-weight:500">有興趣的方案</label><select style="width:100%;padding:12px 16px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.9rem;color:var(--text);border-radius:6px"><option>標準版</option><option>進階版</option><option>企業版（需聯絡）</option><option>還不確定</option></select></div>
