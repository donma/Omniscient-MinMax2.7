  <section class="page-hero">
    <p class="page-hero-label">Schedule a Visit</p>
    <h1 class="page-hero-title">預約<em>門診</em></h1>
    <p class="page-hero-sub">填寫以下表單，我們會致電確認預約時間。</p>
  </section>

  <section class="section">
    <div class="container">
      <div style="max-width:640px;margin:0 auto;">
        <form style="display:flex;flex-direction:column;gap:24px;">
          <div class="form-group">
            <label class="form-label">姓名 *</label>
            <input class="form-input" type="text" placeholder="您的姓名">
          </div>
          <div class="form-group">
            <label class="form-label">電話 *</label>
            <input class="form-input" type="tel" placeholder="+886 9xx xxx xxx">
          </div>
          <div class="form-group">
            <label class="form-label"> Email</label>
            <input class="form-input" type="email" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">想看哪一位醫師？</label>
            <select class="form-select">
              <option value="">不指定醫師</option>
              <option>陳志明 醫師（植牙）</option>
              <option>林怡君 醫師（齒顎矫正）</option>
              <option>張家維 醫師（一般牙科）</option>
              <option>王淑芬 醫師（牙周）</option>
              <option>黃建志 醫師（口腔外科）</option>
              <option>李明芳 醫師（牙髓病）</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">想看哪一個門診？</label>
            <select class="form-select">
              <option value="">請選擇</option>
              <option>一般檢查 / 洗牙</option>
              <option>牙齒美白</option>
              <option>齒顎矫正諮詢</option>
              <option>植牙諮詢</option>
              <option>牙周治療</option>
              <option>其他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">希望的看診日期</label>
            <input class="form-input" type="date">
          </div>
          <div class="form-group">
            <label class="form-label">其他說明或需求</label>
            <textarea class="form-textarea" placeholder="過敏史、正在服用的藥物、或任何想要補充的資訊..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary">送出預約</button>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-top">
      <div><div class="footer-brand">Blanc Dental</div><p class="footer-desc">您的笑容，是我們的使命。</p></div>

    </div>
