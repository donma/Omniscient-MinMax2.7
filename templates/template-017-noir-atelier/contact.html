        <a href="index.html" class="nav-brand">NOIR Atelier</a>

        <div class="nav-actions"><a href="contact.html" class="active">聯絡</a></div>
    </nav>

    <div class="page-container">
        <section class="editorial-section" style="padding: 120px 0;">
            <div class="editorial-grid">
                <div class="col-6">
                    <div class="editorial-section-title">聯絡我們</div>
                    <h1 class="editorial-heading" style="font-size: 48px; margin-bottom: 32px;">，我們隨時<br>為您服務</h1>
                    <p style="color: var(--gray-400); font-size: 16px; line-height: 1.9; margin-bottom: 48px;">
                        無論您是想了解我們的系列產品、尋找最近的銷售點，還是有任何問題，我們的團隊都會在第一時間回覆您。
                    </p>
                    <div style="margin-bottom: 24px;">
                        <h4 style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; color: var(--gray-400);">客戶服務</h4>
                        <p style="font-size: 16px;">service@noiratelier.com</p>
                    </div>
                    <div style="margin-bottom: 24px;">
                        <h4 style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; color: var(--gray-400);">電話</h4>
                        <p style="font-size: 16px;">+886 2 2771 5566</p>
                    </div>
                    <div>
                        <h4 style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; color: var(--gray-400);">地址</h4>
                        <p style="font-size: 16px;">台北市大安區忠孝東路四段 101 號<br>12 樓</p>
                    </div>
                </div>
                <div class="col-6" style="padding-left: 48px;">
                    <form class="contact-form-clean">
                        <div class="form-field">
                            <input type="text" id="name" placeholder=" ">
                            <label for="name">姓名</label>
                        </div>
                        <div class="form-field">
                            <input type="email" id="email" placeholder=" ">
                            <label for="email">Email</label>
                        </div>
                        <div class="form-field">
                            <input type="text" id="subject" placeholder=" ">
                            <label for="subject">主旨</label>
                        </div>
                        <div class="form-field">
                            <textarea id="message" placeholder=" "></textarea>
                            <label for="message">訊息內容</label>
                        </div>
                        <button type="submit" class="btn-submit">
                            <span>傳送訊息</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </div>
