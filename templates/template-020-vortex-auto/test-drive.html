<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST DRIVE | VORTEX AUTO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="vortex-body">
    <header class="vortex-header">
        <a href="index.html" class="vortex-logo">VORTEX</a>
        <nav><ul class="vortex-nav-list"><li><a href="index.html" class="vortex-nav-link">HOME</a></li><li><a href="models.html" class="vortex-nav-link">MODELS</a></li><li><a href="technology.html" class="vortex-nav-link">TECHNOLOGY</a></li><li><a href="experience.html" class="vortex-nav-link">EXPERIENCE</a></li><li><a href="news.html" class="vortex-nav-link">NEWS</a></li><li><a href="contact.html" class="vortex-nav-link">CONTACT</a></li></ul></nav>
        <a href="test-drive.html" class="vortex-header-cta">TEST DRIVE</a>
    </header>
    <section class="vortex-page-hero"><div class="vortex-container"><h1 class="vortex-page-title">TEST DRIVE</h1></div></section>
    <section class="vortex-section-dark">
        <div class="vortex-container">
            <div class="vortex-grid-2">
                <div>
                    <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=800&q=85" alt="Test Drive" style="width:100%;height:500px;object-fit:cover;border-radius:16px;">
                </div>
                <div>
                    <span class="vortex-section-label">EXPERIENCE</span>
                    <h2 class="vortex-section-title" style="text-align:left;font-size:36px;margin-bottom:24px;">FEEL THE POWER</h2>
                    <p class="vortex-section-description" style="text-align:left;margin-bottom:40px;">There's nothing quite like getting behind the wheel of a VORTEX. Book your exclusive test drive today and experience the thrill firsthand.</p>
                    <div class="vortex-contact-form" style="padding: 32px;">
                        <form>
                            <div class="vortex-form-row">
                                <div class="vortex-form-group"><label class="vortex-form-label">FIRST NAME</label><input type="text" class="vortex-form-input" placeholder="John" required></div>
                                <div class="vortex-form-group"><label class="vortex-form-label">LAST NAME</label><input type="text" class="vortex-form-input" placeholder="Doe" required></div>
                            </div>
                            <div class="vortex-form-group"><label class="vortex-form-label">EMAIL</label><input type="email" class="vortex-form-input" placeholder="john@example.com" required></div>
                            <div class="vortex-form-group"><label class="vortex-form-label">PHONE</label><input type="tel" class="vortex-form-input" placeholder="+1 234 567 8900"></div>
                            <div class="vortex-form-group"><label class="vortex-form-label">MODEL INTEREST</label><select class="vortex-form-input" required><option value="">Select a model</option><option value="gt">VORTEX GT</option><option value="rs">VORTEX RS</option><option value="ev">VORTEX EV</option></select></div>
                            <div class="vortex-form-group"><label class="vortex-form-label">PREFERRED DATE</label><input type="date" class="vortex-form-input" required></div>
                            <button type="submit" class="vortex-btn-neon" style="width:100%;justify-content:center;">BOOK TEST DRIVE</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer class="vortex-footer"><div class="vortex-container"><div class="vortex-footer-bottom"><p class="vortex-footer-copyright">© 2024 VORTEX AUTO.</p></div></div></footer>
    <script src="assets/js/main.js"></script>
